name: build and push
on: 
  push:
    branches:
      - main

env:
  IMAGE: dbt-docs
  DBT_I_NAV_ZIP_URL: https://github.com/navikt/dbt-i-nav/releases/latest/download/dbt-i-nav-dist.zip

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
    - uses: actions/checkout@v7
    - name: Download dbt-i-nav frontend bundle
      run: |
        set -euo pipefail
        rm -rf assets/dbt-i-nav
        mkdir -p assets/dbt-i-nav
        curl -fL "$DBT_I_NAV_ZIP_URL" -o /tmp/dbt-i-nav-dist.zip
        unzip -oq /tmp/dbt-i-nav-dist.zip -d assets/dbt-i-nav
    - uses: nais/docker-build-push@v0
      id: docker-build-push
      with:
        team: nada

  deploy:
    name: deploy
    runs-on: ubuntu-24.04
    needs: [build-and-push]
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - name: Deploy to dev
      uses: nais/deploy/actions/deploy@v2
      env:
        CLUSTER: dev-gcp
        RESOURCE: .nais/dev.yaml
        VAR: image=${{ needs.build-and-push.outputs.image }}
    - name: Deploy to prod
      uses: nais/deploy/actions/deploy@v2
      env:
        CLUSTER: prod-gcp
        RESOURCE: .nais/prod.yaml
        VAR: image=${{ needs.build-and-push.outputs.image }}
